name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac-arm:
    name: Build (macOS ARM)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install bun (for sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build sidecar (Express server)
        run: |
          bun build --compile ./server/index.js --outfile src-tauri/binaries/mythpen-server
          mv src-tauri/binaries/mythpen-server src-tauri/binaries/mythpen-server-aarch64-apple-darwin

      - name: Build Tauri app (DMG)
        run: pnpm tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Mythpen-macOS-ARM
          path: src-tauri/target/release/bundle/dmg/*.dmg
          compression-level: 0

  build-win-x86:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install bun (for sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build sidecar (Express server)
        shell: bash
        run: |
          bun build --compile ./server/index.js --outfile src-tauri/binaries/mythpen-server
          mv src-tauri/binaries/mythpen-server src-tauri/binaries/mythpen-server-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app (MSI / NSIS)
        run: pnpm tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Mythpen-Windows-x86_64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          compression-level: 0
