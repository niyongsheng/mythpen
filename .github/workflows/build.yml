name: Build & Release

on:
  push:
    tags: ['v*']

jobs:
  build-mac-arm:
    name: Build (macOS ARM)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install bun (for sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build sidecar (Express server)
        run: |
          bun build --compile ./server/index.js --outfile src-tauri/binaries/mythpen-server
          mv src-tauri/binaries/mythpen-server src-tauri/binaries/mythpen-server-aarch64-apple-darwin

      - name: Build Tauri app (DMG)
        run: pnpm tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Mythpen-macOS-ARM
          path: src-tauri/target/release/bundle/dmg/*.dmg
          compression-level: 0

  build-win-x86:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install bun (for sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build sidecar (Express server)
        shell: bash
        run: |
          bun build --compile ./server/index.js --outfile src-tauri/binaries/mythpen-server
          mv src-tauri/binaries/mythpen-server src-tauri/binaries/mythpen-server-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app (MSI / NSIS)
        run: pnpm tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Mythpen-Windows-x86_64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
          compression-level: 0

  build-linux-x86:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install bun (for sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build sidecar (Express server)
        run: |
          bun build --compile ./server/index.js --outfile src-tauri/binaries/mythpen-server
          mv src-tauri/binaries/mythpen-server src-tauri/binaries/mythpen-server-x86_64-unknown-linux-gnu

      - name: Build Tauri app (deb)
        run: pnpm tauri build --bundles deb,rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mythpen-Linux-x86_64
          path: src-tauri/target/release/bundle/
          compression-level: 0

  # ─── GitHub Release ───
  release:
    name: Create Release
    needs: [build-mac-arm, build-win-x86, build-linux-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-decorate "$PREV_TAG"..HEAD 2>/dev/null | sed 's/^/- /')
            echo "### Changes since $PREV_TAG" > /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "$LOG" >> /tmp/changelog.md
          else
            echo "### Initial release" > /tmp/changelog.md
            echo "" >> /tmp/changelog.md
            echo "This is the first release of Mythpen." >> /tmp/changelog.md
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/changelog.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mythpen ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Mythpen ${{ github.ref_name }}

            AI-assisted novel writing desktop app.

            ### Download

            | Platform | File |
            |---|---|
            | macOS (ARM) | \`.dmg\` — open and drag to Applications |
            | Windows | \`.exe\` — run the installer |
            | Linux (Debian/Ubuntu) | \`.deb\` |
            | Linux (Fedora/CentOS) | \`.rpm\` |

            ---

            ${{ steps.changelog.outputs.body }}
          fail_on_unmatched_files: true
          files: |
            Mythpen-macOS-ARM/*.dmg
            Mythpen-Windows-x86_64/*.exe
            Mythpen-Linux-x86_64/deb/*.deb
            Mythpen-Linux-x86_64/rpm/*.rpm
